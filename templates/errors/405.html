{% extends "base.html" %}
{% block title %}405 - Method Not Allowed{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <i class="fas fa-ban fa-5x text-secondary mb-4"></i>
            <h1 class="display-4">405</h1>
            <h2>Method Not Allowed</h2>
            <p class="text-muted">The HTTP method used is not allowed for this route.</p>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-success">
                <i class="fas fa-home me-2"></i>Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
