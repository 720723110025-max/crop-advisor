services:
  - type: web
    name: crop-advisory-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: crop_advisory_db
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: UPLOAD_FOLDER
        value: app/static/uploads
